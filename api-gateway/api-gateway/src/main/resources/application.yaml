spring:
  application:
    name: api-gateway

#cloud.gateway.routes, has been changed to cloud.gateway.server.webflux.routes
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/v1/orders/** #now we've to use the /api/v1 while requesting
              filters:
                - StripPrefix=2 #removes the api/v1 from the path, and request is then handled by order-service
#                - RedirectTo=302, http://google.com #redirects to this url
                - name: OrdersLoggingFilter

            - id: inventory-service
              uri: lb://INVENTORY-SERVICE
              predicates:
                - Path=/api/v1/inventory/**
              filters:
                - StripPrefix=2
                - AddRequestHeader=X-custom-header, noviceanemone #can add custom header

#eureka-config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


