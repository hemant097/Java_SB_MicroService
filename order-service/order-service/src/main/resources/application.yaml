spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/week12dbp2
    username: postgres
    password: root

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always
      data-locations: classpath:data.sql

server:
  servlet:
    context-path: /api/v1
  port: 9020

